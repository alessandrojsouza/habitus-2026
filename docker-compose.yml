services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/usr/src/python/app/devadmin/data
      - media_data:/usr/src/python/app/devadmin/media
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:////usr/src/python/app/devadmin/data/db.sqlite3
volumes:
  sqlite_data:
  media_data: